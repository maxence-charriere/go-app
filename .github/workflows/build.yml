name: Build

on:
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  code:
    name: Code Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Vet
        run: go vet ./...

  server:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Run unit tests
        run: go test -race ./...

  client:
    name: WebAssembly Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GOOS: js
      GOARCH: wasm

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Install WASM browser test runner
        run: |
          GOBIN="$(go env GOPATH)/bin"
          go install github.com/agnivade/wasmbrowsertest@latest
          mv "${GOBIN}/wasmbrowsertest" "${GOBIN}/go_js_wasm_exec"

      - name: Run WebAssembly unit tests
        run: |
          go test ./pkg/app
          go test ./pkg/errors
          go test ./pkg/logs
